<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pregnancy Monitoring</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f7f6;
}

/* Header */

.header{
background:#2e8b57;
color:white;
padding:15px;
display:flex;
align-items:center;
gap:10px;
}

.header img{
width:35px;
}

/* Main container */

.container{

width:800px;

margin:40px auto;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,0.15);

}

/* Form */

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input{

width:100%;

padding:10px;

border-radius:6px;

border:1px solid #ccc;

}

button{

margin-top:10px;

padding:10px 15px;

background:#2e8b57;

color:white;

border:none;

border-radius:6px;

cursor:pointer;

}

/* Result box */

.result{

margin-top:20px;

padding:20px;

background:#f1f9f7;

border-radius:10px;

display:none;

}

.result h3{
color:#2e8b57;
margin-bottom:10px;
}

.tips{
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">

<img src="https://img.icons8.com/color/96/pregnant.png" alt="Pregnant woman icon">

<h2>Pregnancy Monitoring</h2>

</div>


<div class="container">

<h3>Track Your Pregnancy</h3>

<div class="form-group">

<label>Mother Name</label>

<input type="text" id="name" placeholder="Enter mother's name">

</div>

<div class="form-group">

<label>Pregnancy Start Date</label>

<input type="date" id="date" title="Select pregnancy start date">

</div>

<div class="form-group">

<label>Age</label>

<input type="number" id="age" placeholder="Enter your age">

</div>

<button onclick="calculate()">Check Pregnancy Status</button>


<div class="result" id="result">

<h3>Pregnancy Status</h3>

<p id="weeks"></p>

<div class="tips">

<h3>Health Tips</h3>

<p id="tips"></p>

</div>

</div>

</div>


<script>

function calculate(){

let startDate=document.getElementById("date").value;

let today=new Date();

let start=new Date(startDate);

let diff=today-start;

let weeks=Math.floor(diff/(1000*60*60*24*7));

document.getElementById("result").style.display="block";

document.getElementById("weeks").innerHTML="You are currently in week "+weeks+" of pregnancy.";

let advice="Maintain a healthy diet and attend regular checkups.";

if(weeks<12)
advice="First trimester: take folic acid and avoid heavy work.";

else if(weeks<28)
advice="Second trimester: maintain nutrition and attend monthly checkups.";

else
advice="Third trimester: prepare for delivery and attend weekly checkups.";

document.getElementById("tips").innerHTML=advice;

}

</script>

</body>
</html>
