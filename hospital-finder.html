<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearest Hospital Finder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f7f6;
}

/* Header */

.header{
background:#2e8b57;
color:white;
padding:15px;
display:flex;
align-items:center;
gap:10px;
}

.header img{
width:35px;
}

/* Container */

.container{
padding:20px;
display:flex;
gap:20px;
}

/* Map */

.map{
flex:2;
height:500px;
border-radius:10px;
overflow:hidden;
}

.map iframe{
border:0;
}

/* Hospital list */

.list{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.list h3{
color:#2e8b57;
margin-bottom:10px;
}

.hospital{
padding:10px;
border-bottom:1px solid #ddd;
}

.hospital:last-child{
border:none;
}

button{
margin-top:15px;
padding:10px 15px;
background:#2e8b57;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<img src="https://img.icons8.com/color/96/hospital.png" alt="Hospital icon">

<h2>Nearest Hospital Finder</h2>

</div>


<div class="container">

<div class="map">

<iframe
width="100%"
height="100%"
title="Google Maps showing nearby hospitals"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=hospital&output=embed">
</iframe>

</div>


<div class="list">

<h3>Nearby Hospitals</h3>

<div class="hospital">
🏥 Rural Health Clinic<br>
📍 2.1 km away
</div>

<div class="hospital">
🏥 Government Hospital<br>
📍 3.5 km away
</div>

<div class="hospital">
🏥 City Medical Center<br>
📍 5.2 km away
</div>

<button onclick="findLocation()">Find My Location</button>

</div>

</div>


<script>

function findLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(showPosition);

}

else{

alert("Geolocation not supported");

}

}

function showPosition(position){

let lat=position.coords.latitude;

let lon=position.coords.longitude;

let mapURL="https://www.google.com/maps?q="+lat+","+lon+"&output=embed";

document.querySelector("iframe").src=mapURL;

}

</script>

</body>
</html>
